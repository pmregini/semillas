<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SeedDex by Milo</title>
    <style>
        :root {
            --bg-color: #f4f7f5;
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --primary: #27ae60;
            --primary-dark: #1e8449;
            --accent-egg: #f39c12;
            --accent-egg-dark: #d35400;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 16px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 24px;
        }

        header h1 {
            font-size: 1.8rem;
            color: var(--primary);
        }

        header p {
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        .search-box {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        /* Selector de Categorías */
        .type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .type-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e0e0e0;
            background: #fff;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.95rem;
        }

        .type-btn.active[data-type="planta"] {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .type-btn.active[data-type="huevo"] {
            background: var(--accent-egg);
            color: white;
            border-color: var(--accent-egg);
        }

        .search-box label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .input-group {
            display: flex;
            gap: 8px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--primary);
        }

        .search-box.huevo-mode input[type="text"]:focus {
            border-color: var(--accent-egg);
        }

        button.main-search-btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .search-box.huevo-mode button.main-search-btn {
            background-color: var(--accent-egg);
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
            font-weight: bold;
            color: var(--primary);
        }

        .error-message {
            background: #fadbd8;
            color: #78281f;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .result-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            padding: 20px;
            display: none;
        }

        .result-card h2 {
            font-size: 1.5rem;
            margin-bottom: 16px;
            color: var(--primary-dark);
            text-transform: capitalize;
            border-bottom: 2px solid #f0f0f0;
            padding-bottom: 8px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .img-container {
            background: #eef2f0;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 1 / 1;
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .img-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.6);
            color: white;
            font-size: 0.75rem;
            padding: 4px 8px;
            text-align: center;
        }

        .info-item {
            margin-bottom: 12px;
            background: #f9f9f9;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid var(--primary);
        }

        .result-card.huevo-theme .info-item {
            border-left-color: var(--accent-egg);
        }

        .info-item strong {
            display: block;
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 4px;
        }

        .info-item p {
            font-size: 0.95rem;
            text-align: justify;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌱 SeedDex by Milo</h1>
        <p>Buscador botánico y zoológico en tiempo real</p>
    </header>

    <div class="search-box" id="search-box-wrapper">
        <div class="type-selector">
            <button class="type-btn active" data-type="planta">🌱 Planta / Semilla</button>
            <button class="type-btn" data-type="huevo">🥚 Huevo / Ave</button>
        </div>

        <label id="input-label" for="search-input">¿De qué semilla o fruto querés saber?</label>
        <div class="input-group">
            <input type="text" id="search-input" placeholder="Ej: Manzana, Tomate, Palta..." autocomplete="off">
            <button id="search-btn" class="main-search-btn">Buscar</button>
        </div>
    </div>

    <div class="loader" id="loader">🔍 Buscando información en tiempo real...</div>
    <div class="error-message" id="error-box"></div>

    <div class="result-card" id="result-card">
        <h2 id="res-nombre">Resultado</h2>
        
        <div class="gallery-grid">
            <div class="img-container">
                <img id="img-1" src="" alt="Imagen 1">
                <div class="img-label" id="lbl-1">Semilla</div>
            </div>
            <div class="img-container">
                <img id="img-2" src="" alt="Imagen 2">
                <div class="img-label" id="lbl-2">Planta / Árbol</div>
            </div>
            <div class="img-container">
                <img id="img-3" src="" alt="Imagen 3">
                <div class="img-label" id="lbl-3">Fruto</div>
            </div>
            <div class="img-container">
                <img id="img-4" src="" alt="Imagen 4">
                <div class="img-label" id="lbl-4">Flor</div>
            </div>
        </div>

        <div class="info-section">
            <div class="info-item">
                <strong id="title-item-1">Información General y Botánica:</strong>
                <p id="res-desc-1">Cargando...</p>
            </div>
            <div class="info-item">
                <strong id="title-item-2">Guía de Cultivo de la Planta:</strong>
                <p id="res-desc-2">Cargando...</p>
            </div>
            <div class="info-item">
                <strong id="title-item-3">Requerimientos Ambientales y Suelo:</strong>
                <p id="res-desc-3">Cargando...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const searchInput = document.getElementById('search-input');
    const searchBtn = document.getElementById('search-btn');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('error-box');
    const resultCard = document.getElementById('result-card');
    const typeButtons = document.querySelectorAll('.type-btn');
    const searchBoxWrapper = document.getElementById('search-box-wrapper');
    const inputLabel = document.getElementById('input-label');

    let currentType = 'planta';

    // Manejo del selector previo de categorías
    typeButtons.forEach(btn => {
        btn.addEventListener('click', () => {
            typeButtons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentType = btn.getAttribute('data-type');

            if (currentType === 'planta') {
                searchBoxWrapper.classList.remove('huevo-mode');
                inputLabel.innerText = '¿De qué semilla o fruto querés saber?';
                searchInput.placeholder = 'Ej: Manzana, Tomate, Palta...';
                loader.style.color = '#27ae60';
            } else {
                searchBoxWrapper.classList.add('huevo-mode');
                inputLabel.innerText = '¿De qué huevo o ave querés saber?';
                searchInput.placeholder = 'Ej: Huevo de codorniz, Avestruz, Gallina...';
                loader.style.color = '#f39c12';
            }
        });
    });

    async function buscarEnInternet() {
        const query = searchInput.value.trim();
        if (!query) return;

        loader.style.display = 'block';
        errorBox.style.display = 'none';
        resultCard.style.display = 'none';

        // Evitar homónimos inyectando palabras contextuales clave a la query de búsqueda
        let searchQuery = query;
        if (currentType === 'planta') {
            searchQuery = `${query} (planta)`;
        } else {
            searchQuery = `${query} (ave)`;
        }

        try {
            // Fetch de Wikipedia estructurado tolerante
            const wikiUrl = `https://es.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=0&explaintext=1&titles=${encodeURIComponent(searchQuery)}&origin=*`;
            let wikiResp = await fetch(wikiUrl);
            let wikiData = await wikiResp.json();
            let pages = wikiData.query.pages;
            let pageId = Object.keys(pages)[0];

            // Segunda oportunidad defensiva si falla con el sufijo (intenta búsqueda cruda)
            if (pageId === "-1") {
                const fallbackUrl = `https://es.wikipedia.org/w/api.php?action=query&format=json&prop=extracts&exintro=0&explaintext=1&titles=${encodeURIComponent(query)}&origin=*`;
                wikiResp = await fetch(fallbackUrl);
                wikiData = await wikiResp.json();
                pages = wikiData.query.pages;
                pageId = Object.keys(pages)[0];
            }

            if (pageId === "-1") {
                throw new Error(`No encontramos resultados precisos para "${query}" en esta categoría.`);
            }

            const textoCompleto = pages[pageId].extract;
            document.getElementById('res-nombre').innerText = pages[pageId].title;

            // Configuración dinámica de campos según el selector
            if (currentType === 'planta') {
                resultCard.classList.remove('huevo-theme');
                document.getElementById('lbl-1').innerText = "Semilla";
                document.getElementById('lbl-2').innerText = "Planta / Árbol";
                document.getElementById('lbl-3').innerText = "Fruto";
                document.getElementById('lbl-4').innerText = "Flor";

                document.getElementById('title-item-1').innerText = "Información General y Botánica:";
                document.getElementById('title-item-2').innerText = "Guía de Cultivo de la Planta:";
                document.getElementById('title-item-3').innerText = "Requerimientos Ambientales y Suelo:";

                document.getElementById('res-desc-1').innerText = cortarTexto(textoCompleto, 0, 450);
                document.getElementById('res-desc-2').innerText = encontrarSeccionOClonar(textoCompleto, ["cultivo", "siembra", "propagación", "crecimiento"], "Sembrar en sustrato orgánico suelto a profundidad moderada (el doble del tamaño de la semilla). Mantener la humedad constante sin encharcar.");
                document.getElementById('res-desc-3').innerText = encontrarSeccionOClonar(textoCompleto, ["suelo", "clima", "temperatura", "luz"], "Requiere suelos con excelente drenaje, ricos en nutrientes y exposición directa al sol entre 4 y 6 horas diarias en climas templados.");
            } else {
                resultCard.classList.add('huevo-theme');
                document.getElementById('lbl-1').innerText = "Huevo";
                document.getElementById('lbl-2').innerText = "Ave Adulta";
                document.getElementById('lbl-3').innerText = "Nido / Cría";
                document.getElementById('lbl-4').innerText = "Hábitat";

                document.getElementById('title-item-1').innerText = "Información de la Especie:";
                document.getElementById('title-item-2').innerText = "Proceso de Incubación y Nido:";
                document.getElementById('title-item-3').innerText = "Alimentación y Características:";

                document.getElementById('res-desc-1').innerText = cortarTexto(textoCompleto, 0, 450);
                document.getElementById('res-desc-2').innerText = encontrarSeccionOClonar(textoCompleto, ["incubación", "nido", "reproducción", "huevo"], "El periodo de incubación varía por especie. Requieren control estricto de temperatura constante y humedad controlada en el nido.");
                document.getElementById('res-desc-3').innerText = encontrarSeccionOClonar(textoCompleto, ["alimentación", "hábitat", "comportamiento"], "Dieta basada en granos, insectos o nutrientes específicos de la especie. Requieren espacios protegidos de corrientes de aire frío.");
            }

            // Solución definitiva al fetch de fotos: Evitamos endpoints caídos mapeando las keywords en inglés directamente a Unsplash Source dinámico por redirección nativa HTTP
            const queryClean = encodeURIComponent(query.toLowerCase());
            if (currentType === 'planta') {
                document.getElementById('img-1').src = `https://images.unsplash.com/photo-1600180758890-6b94e61025a5?w=500&q=80`; // Fallback semilla
                document.getElementById('img-1').src = `https://images.unsplash.com/photo-1515150144380-bca9f1650ed9?w=500&q=80`; // Fallback brote
                document.getElementById('img-3').src = `https://images.unsplash.com/photo-1610397648930-475583d71450?w=500&q=80`; // Fallback fruto

                document.getElementById('img-1').src = `https://images.unsplash.com/featured/500x500/?${queryClean},seed,seeds`;
                document.getElementById('img-2').src = `https://images.unsplash.com/featured/500x500/?${queryClean},plant`;
                document.getElementById('img-3').src = `https://images.unsplash.com/featured/500x500/?${queryClean
